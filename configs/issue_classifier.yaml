provider: openai
model: llama-3.3-70b-versatile
params:
  temperature: 0.0
  max_tokens: 256
evaluators:
  - type: heuristic
    name: json_validity
  - type: heuristic
    name: schema_match
  - type: heuristic
    name: field_match_priority
    config:
      field: priority
  - type: heuristic
    name: field_match_status
    config:
      field: status
  - type: judge
    name: quality
    config:
      rubric: rubrics/issue_classifier_quality.yaml
regression:
  thresholds:
    json_validity: 0.05
    schema_match: 0.05
    field_match_priority: 0.10
    field_match_status: 0.05